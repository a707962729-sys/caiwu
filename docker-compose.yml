version: '3.8'

services:
  # API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: caiwu-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/caiwu.db
      - JWT_SECRET=caiwu-jwt-secret-key-2024
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:18789
      - OPENCLAW_GATEWAY_TOKEN=c29ab6c81f0fc727c0f7307d9526a490f5b37831fa740bc8
      - AI_MODEL=glm
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/openclaw/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin 前端
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: caiwu-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: caiwu-network